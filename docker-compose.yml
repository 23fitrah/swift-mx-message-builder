services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swift-mx-message-builder
    env_file:
      - .env
    ports:
      - "${SERVER_PORT}:9090"

  jenkins:
    image: jenkins/jenkins:latest   # image resmi Jenkins LTS terbaru, sudah dengan JDK 21
    container_name: jenkins
    restart: unless-stopped
    user: root                         # supaya bisa akses docker.sock (build image di dalam pipeline)
    ports:
      - "8080:8080"                    # akses web UI Jenkins
      - "50000:50000"                  # port agent JNLP (untuk Jenkins agent/slave)
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false   # skip wizard awal (opsional, hapus jika mau setup manual)
      - TZ=Asia/Jakarta
    volumes:
      - jenkins_home:/var/jenkins_home            # data & konfigurasi Jenkins persist
      - /var/run/docker.sock:/var/run/docker.sock # supaya Jenkins bisa jalankan docker build/run
      - /usr/bin/docker:/usr/bin/docker            # binary docker dari host (opsional, tergantung OS)
    networks:
      - jenkins_net

  # (Opsional) Jenkins agent terpisah untuk menjalankan job build secara terdistribusi
  jenkins-agent:
    image: jenkins/inbound-agent:latest
    container_name: jenkins-agent
    restart: unless-stopped
    depends_on:
      - jenkins
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=agent-1
      - JENKINS_SECRET=CHANGE_ME        # ambil dari Jenkins > Manage Nodes setelah agent didaftarkan
    networks:
      - jenkins_net

volumes:
  jenkins_home:
    driver: local

networks:
  jenkins_net:
    driver: bridge
